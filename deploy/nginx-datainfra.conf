# DataInfra 前端静态资源 + 后端 API 反代
#
# 使用前请确认：
# 1) 已执行 frontend 目录下 npm run build，dist 存在
# 2) 后端 FastAPI 已监听 127.0.0.1:8000（与 vite dev 代理一致）
#
# 安装示例（Debian/Ubuntu）：
#   sudo cp deploy/nginx-datainfra.conf /etc/nginx/sites-available/datainfra.conf
#   sudo ln -sf /etc/nginx/sites-available/datainfra.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 浏览器访问：http://服务器IP:3001 或 http://127.0.0.1:3001
#
# 若出现 500 / 无法访问：多为「家目录不可穿越」。nginx 以 www-data 运行，须能沿路径
# stat 到 dist；若 /home/你的用户 为 750，请执行（二选一）：
#   sudo chmod o+x /home/spark
# 或把 dist 拷到 /var/www/… 后改下面 root，并 chown -R www-data（见 deploy/fix_nginx_dist_permissions.sh）

upstream datainfra_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 3001;
    listen [::]:3001;
    server_name _;

    root /home/spark/Desktop/work/data-infra-redaction-everything-main1.0/frontend/dist;
    index index.html;

    # 上传/导出等接口需要较大 body
    client_max_body_size 200m;

    # 静态资源缓存（带 hash 的文件名可长期缓存）
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://datainfra_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    location /health {
        proxy_pass http://datainfra_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://datainfra_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /outputs/ {
        proxy_pass http://datainfra_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA：其余路径回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
