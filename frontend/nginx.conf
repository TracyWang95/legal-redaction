limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Content-Security-Policy ────────────────────────────────────────────
    #
    # TODO: Replace 'unsafe-inline' with nonce-based CSP when using nginx-njs or OpenResty
    #
    # Current limitation: Vite injects inline <style> tags at build time, so
    # style-src requires 'unsafe-inline'. A nonce-based CSP would be stronger
    # but requires server-side nonce generation per request.
    #
    # Upgrade path (choose one):
    #
    #   Option A — OpenResty + Lua (recommended for production):
    #     1. Switch base image to openresty/openresty:alpine
    #     2. Use set_by_lua_block to generate a per-request nonce:
    #          set_by_lua_block $csp_nonce {
    #            return require("resty.core.base").ngx.encode_base64(
    #              require("resty.string").random(16))
    #          }
    #     3. Use sub_filter to inject nonce into <style> and <script> tags:
    #          sub_filter_once off;
    #          sub_filter '<style' '<style nonce="$csp_nonce"';
    #     4. Update CSP header:
    #          style-src 'self' 'nonce-$csp_nonce';
    #          script-src 'self' 'nonce-$csp_nonce';
    #
    #   Option B — nginx-njs module:
    #     1. Load ngx_http_js_module
    #     2. Generate nonce via js_set $csp_nonce
    #     3. Same sub_filter + header approach as Option A
    #
    #   Option C — Hash-based CSP (no server changes):
    #     1. At build time, compute SHA-256 hashes of all inline styles
    #     2. Add 'sha256-<hash>' to style-src for each inline block
    #     3. Requires rebuild + config update whenever styles change
    #
    # Until one of the above is implemented, 'unsafe-inline' remains the
    # pragmatic default for style-src.
    # ───────────────────────────────────────────────────────────────────────
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self'" always;

    # HSTS - uncomment when serving over HTTPS
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 前端路由支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理到后端
    location /api {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 上传文件大小限制
        client_max_body_size 50M;

        # 与后端 OCR 超时对齐
        proxy_read_timeout 400s;
        proxy_send_timeout 400s;
    }

    # 健康检查代理（不在 /api 路径下）
    location /health {
        proxy_pass http://backend:8000;
        proxy_read_timeout 60s;
    }

    # 缓存静态资源（重复安全头，因为 Nginx add_header 在子 location 不继承父级）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
    }
}
